name: TechCrunch Daily Digest

on:
  schedule:
    # 07:10 UTC every day — articles from yesterday are now fully available
    - cron: "10 7 * * *"
  workflow_dispatch: # trigger manually from GitHub Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the DB + JSON files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run digest processor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional — only needed if you also want the email digest
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
        run: python digest.py

      - name: Commit digest data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.db public/data/
          # Only commit when something actually changed
          git diff --staged --quiet || \
            git commit -m "chore: digest $(date -u +%Y-%m-%d)"
          git push
